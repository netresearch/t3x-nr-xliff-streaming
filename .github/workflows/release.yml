name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    uses: netresearch/typo3-ci-workflows/.github/workflows/release-typo3-extension.yml@main
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      archive-prefix: nr-xliff-streaming
      package-name: netresearch/nr-xliff-streaming
      extension-key: nr_xliff_streaming
      # No TYPO3_TER_ACCESS_TOKEN secret in this repo — remove once the token is configured.
      skip-ter: true
